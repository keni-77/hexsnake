<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hex Snake</title>

  <style>
  /* 全体のベース：漆黒の宇宙やサイバー空間をイメージ */
  body {
    background-color: #0a0a12;
    background-image: 
      linear-gradient(rgba(18, 18, 32, 0.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(18, 18, 32, 0.5) 1px, transparent 1px);
    background-size: 20px 20px; /* うっすら背景に走るグリッド線 */
    color: #e2e8f0;
    font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    box-sizing: border-box;
    overflow-x: hidden;
  }

  /* ゲームのメインタイトル */
  h1 {
    font-size: 2.8rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin: 0 0 5px 0;
    background: linear-gradient(135deg, #ffd86b 0%, #ff7700 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 8px rgba(255, 119, 0, 0.5));
    text-align: center;
  }

  /* サブタイトル・キャッチコピー */
  .subtitle {
    font-size: 0.9rem;
    color: #5f7594;
    text-transform: uppercase;
    letter-spacing: 6px;
    margin-bottom: 25px;
    text-align: center;
  }

  /* スコア表示エリア */
  #score-container {
    font-size: 1.4rem;
    font-weight: bold;
    color: #00ff87;
    background: rgba(0, 255, 135, 0.05);
    border: 1px solid rgba(0, 255, 135, 0.2);
    padding: 8px 24px;
    border-radius: 20px;
    margin-bottom: 20px;
    box-shadow: 0 0 15px rgba(0, 255, 135, 0.1);
    letter-spacing: 1px;
  }
  
  #score-container span {
    color: #ffffff;
    font-family: monospace;
    margin-left: 5px;
  }

  /* canvasと画像を囲む外枠（以前作ったラッパー） */
  .canvas-wrapper {
    position: relative;
    display: inline-block;
    border: 2px solid rgba(95, 117, 148, 0.3);
    border-radius: 12px;
    padding: 6px;
    background: rgba(15, 15, 25, 0.8);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
  }

  canvas {
    background: #0f0f16;
    display: block;
    border-radius: 8px;
    outline: none;
    touch-action: none;
  }

  /* 右上の操作説明画像（usage.png） */
  .usage-guide {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 20%;
    height: auto;
    opacity: 1.0;
    z-index: 150;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
  }

  /* マウスをゲーム画面に乗せたら、ガイドを少しはっきり見せる */
  .canvas-wrapper:hover .usage-guide {
    transform: scale(1.25);
  }
  </style>
</head>
<body>
  
  <h1>Hexagon Snake Game</h1>
  <div class="subtitle">Cybernetic Honey Hunt</div>

  <div id="score-container">
    SCORE:<span id="score">0</span>
  </div>

  <div class="canvas-wrapper">
    <canvas id="canvas"></canvas>
    <img src="usage.png" alt="操作方法" class="usage-guide" />
  </div>

  <script>
    // -------------------------
    // Config
    // -------------------------
    const BOARD_RADIUS = 6;
    const ROT_DEG = 30;
    const STEP_MS_DEFAULT = 320;
    const MIN_HEX_SIZE = 6;
    const CANVAS_MARGIN = 120;

    // -------------------------
    // Globals
    // -------------------------
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const score_span = document.getElementById("score");

    let HEX_SIZE = 24;
    let CENTER_X = 0;
    let CENTER_Y = 0;

    const ROT_RAD = -ROT_DEG * Math.PI / 180;
    const COS_A = Math.cos(ROT_RAD);
    const SIN_A = Math.sin(ROT_RAD);

    let snake = [];
    let current_dir = [0, -1];
    let honey = null; // [q, r]
    let running = false;
    let game_over = false;
    let interval_id = null;
    let STEP_MS = STEP_MS_DEFAULT;
    let score = 0;

    const NEIGHBORS = [[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];
    let DIR_MAPPING = {}; // 初期化時に計算されるように変更

    // -------------------------
    // Geometry / helpers
    // -------------------------
    function eq(a, b) {
      if (!a || !b) return false;
      return a[0] === b[0] && a[1] === b[1];
    }

    function inSnake(cell) {
      return snake.some(s => eq(s, cell));
    }

    function rotate_point(x, y) {
      const tx = x - CENTER_X;
      const ty = y - CENTER_Y;
      const rx = tx * COS_A - ty * SIN_A;
      const ry = tx * SIN_A + ty * COS_A;
      return [rx + CENTER_X, ry + CENTER_Y];
    }

    function axial_to_pixel_raw(q, r) {
      const x = HEX_SIZE * (Math.sqrt(3) * q + (Math.sqrt(3)/2) * r);
      const y = HEX_SIZE * (3/2 * r);
      return [x + CENTER_X, y + CENTER_Y];
    }

    function axial_to_pixel(q, r) {
      const [x, y] = axial_to_pixel_raw(q, r);
      return rotate_point(x, y);
    }

    function in_board(cell) {
      const [q, r] = cell;
      return Math.abs(q) <= BOARD_RADIUS && Math.abs(r) <= BOARD_RADIUS && Math.abs(q + r) <= BOARD_RADIUS;
    }

    // -------------------------
    // Responsive canvas sizing
    // -------------------------
    function resize_canvas() {
      let w = Math.min(window.innerWidth - CANVAS_MARGIN, 900);
      if (w < 200) w = window.innerWidth - 40;
      canvas.width = w;
      canvas.height = w;
      CENTER_X = canvas.width / 2;
      CENTER_Y = canvas.height / 2;
      const max_cols = (2 * BOARD_RADIUS + 1);
      HEX_SIZE = Math.min(
        (canvas.width - CANVAS_MARGIN*2) / (max_cols * Math.sqrt(3)),
        (canvas.height - CANVAS_MARGIN*2) / (max_cols * 1.5)
      );
      if (HEX_SIZE < MIN_HEX_SIZE) HEX_SIZE = MIN_HEX_SIZE;
      if (!running && !game_over) render(null);
      else render();
    }

    // -------------------------
    // Drawing
    // -------------------------
    function draw_hex_vertices_raw(q, r) {
      const [cx_raw, cy_raw] = axial_to_pixel_raw(q, r);
      let verts = [];
      for (let i = 0; i < 6; i++) {
        const angle = (60 * i - 30) * Math.PI / 180;
        const px = cx_raw + HEX_SIZE * Math.cos(angle);
        const py = cy_raw + HEX_SIZE * Math.sin(angle);
        verts.push(rotate_point(px, py));
      }
      return verts;
    }

    function draw_hex_at(q, r, fill_color, stroke_color="#222", stroke=true, overlap=false) {
      const verts = draw_hex_vertices_raw(q, r);
      if (overlap) {
        const [cx, cy] = axial_to_pixel(q, r);
        ctx.beginPath();
        verts.forEach((v, i) => {
          const sx = cx + (v[0] - cx) * 1.06;
          const sy = cy + (v[1] - cy) * 1.06;
          if (i === 0) ctx.moveTo(sx, sy);
          else ctx.lineTo(sx, sy);
        });
        ctx.closePath();
        ctx.fillStyle = fill_color;
        ctx.fill();
      }
      ctx.beginPath();
      verts.forEach((v, i) => {
        if (i === 0) ctx.moveTo(v[0], v[1]);
        else ctx.lineTo(v[0], v[1]);
      });
      ctx.closePath();
      ctx.fillStyle = fill_color;
      ctx.fill();
      if (stroke) {
        ctx.strokeStyle = stroke_color;
        ctx.lineWidth = 1.2;
        ctx.stroke();
      }
    }

    function draw_board() {
      for (let q = -BOARD_RADIUS; q <= BOARD_RADIUS; q++) {
        for (let r = -BOARD_RADIUS; r <= BOARD_RADIUS; r++) {
          if (Math.abs(q + r) <= BOARD_RADIUS) {
            draw_hex_at(q, r, "#2f2f2f", "#1f1f1f");
          }
        }
      }
    }

    // -------------------------
    // Honey & Effects
    // -------------------------
    let honey_hex_effect = null;

    function trigger_honey_spawn_effect(cx, cy) {
      // 粒子や波紋は使わず、シンプルな六角形エフェクトのみをセット
      honey_hex_effect = {
        cx: cx,
        cy: cy,
        scale: 1.0,
        alpha: 1.0
      };
    }

    function spawn_one_random_honey_not_on_snake() {
      let free = [];
      for (let q = -BOARD_RADIUS; q <= BOARD_RADIUS; q++) {
        for (let r = -BOARD_RADIUS; r <= BOARD_RADIUS; r++) {
          const cell = [q, r];
          if (in_board(cell) && !inSnake(cell)) {
            free.push(cell);
          }
        }
      }
      if (free.length === 0) {
        honey = null;
        return null;
      }
      honey = free[Math.floor(Math.random() * free.length)];
      
      const [cx, cy] = axial_to_pixel(honey[0], honey[1]);
      trigger_honey_spawn_effect(cx, cy);

      return honey;
    }

    // -------------------------
    // Snake
    // -------------------------
    function place_initial_snake() {
      const up_dir = DIR_MAPPING["w"];
      current_dir = up_dir;
      
      const head = [0, 0]; 
      const mid = [0 - up_dir[0], 0 - up_dir[1]];
      const tail = [0 - 2 * up_dir[0], 0 - 2 * up_dir[1]];
      
      snake = [head, mid, tail];
    }

    function draw_snake() {
      const len = snake.length;
      
      ctx.save();
      ctx.shadowBlur = HEX_SIZE * 0.4;
      
      for (let i = len - 1; i >= 0; i--) {
        const [q, r] = snake[i];
        
        if (i === 0) {
          ctx.shadowColor = "#00ff87";
          const [cx, cy] = axial_to_pixel(q, r);
          let grad = ctx.createRadialGradient(cx, cy, 2, cx, cy, HEX_SIZE);
          grad.addColorStop(0, "#8ef0b8");
          grad.addColorStop(1, "#118c4f");
          
          draw_hex_at(q, r, grad, "#00ff87", true, true);
          draw_head_eyes(snake[i]);
          
        } else {
          const ratio = (len - i) / len;
          const sizeMultiplier = 0.75 + ratio * 0.25; 
          
          ctx.shadowColor = "rgba(0, 255, 135, " + (ratio * 0.4) + ")"; 
          
          const rColor = Math.floor(58 + (16 - 58) * (1 - ratio));
          const gColor = Math.floor(163 + (75 - 163) * (1 - ratio));
          const bColor = Math.floor(106 + (69 - 106) * (1 - ratio));
          
          const verts = draw_hex_vertices_raw(q, r);
          const [cx, cy] = axial_to_pixel(q, r);
          
          ctx.beginPath();
          verts.forEach((v, idx) => {
            const sx = cx + (v[0] - cx) * 1.05 * sizeMultiplier;
            const sy = cy + (v[1] - cy) * 1.05 * sizeMultiplier;
            if (idx === 0) ctx.moveTo(sx, sy);
            else ctx.lineTo(sx, sy);
          });
          ctx.closePath();
          ctx.fillStyle = `rgb(${rColor}, ${gColor}, ${bColor})`;
          ctx.fill();
          
          ctx.beginPath();
          verts.forEach((v, idx) => {
            const sx = cx + (v[0] - cx) * 0.85 * sizeMultiplier;
            const sy = cy + (v[1] - cy) * 0.85 * sizeMultiplier;
            if (idx === 0) ctx.moveTo(sx, sy);
            else ctx.lineTo(sx, sy);
          });
          ctx.closePath();
          ctx.strokeStyle = `rgba(0, 255, 135, ${ratio * 0.3})`;
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      }
      ctx.restore(); 
    }

    function draw_head_eyes(head) {
      const [dq, dr] = current_dir;
      const [x0, y0] = axial_to_pixel_raw(0, 0);
      const [x1, y1] = axial_to_pixel_raw(dq, dr);
      const [rx0, ry0] = rotate_point(x0, y0);
      const [rx1, ry1] = rotate_point(x1, y1);
      const dx = rx1 - rx0;
      const dy = ry1 - ry0;
      const ang = Math.atan2(dy, dx);

      const [hx, hy] = axial_to_pixel(head[0], head[1]);
      const forward = [Math.cos(ang), Math.sin(ang)];
      const perp = [-forward[1], forward[0]];

      const eye_dist_forward = HEX_SIZE * 0.4;
      const eye_dist_side = HEX_SIZE * 0.25;
      const eye_radius = Math.max(2, Math.floor(HEX_SIZE * 0.16));

      const lx = hx + forward[0]*eye_dist_forward + perp[0]*eye_dist_side;
      const ly = hy + forward[1]*eye_dist_forward + perp[1]*eye_dist_side;
      const rx = hx + forward[0]*eye_dist_forward - perp[0]*eye_dist_side;
      const ry = hy + forward[1]*eye_dist_forward - perp[1]*eye_dist_side;

      ctx.save();
      ctx.shadowBlur = 8;
      ctx.shadowColor = "#00ffff"; 
      
      ctx.beginPath();
      ctx.fillStyle = "#00ffff";
      ctx.arc(lx, ly, eye_radius, 0, 2*Math.PI);
      ctx.fill();
      
      ctx.beginPath();
      ctx.fillStyle = "#00ffff";
      ctx.arc(rx, ry, eye_radius, 0, 2*Math.PI);
      ctx.fill();

      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(lx - perp[0]*eye_radius*0.5, ly - perp[1]*eye_radius*0.5);
      ctx.lineTo(lx + perp[0]*eye_radius*0.5, ly + perp[1]*eye_radius*0.5);
      ctx.stroke();
      
      ctx.beginPath();
      ctx.moveTo(rx - perp[0]*eye_radius*0.5, ry - perp[1]*eye_radius*0.5);
      ctx.lineTo(rx + perp[0]*eye_radius*0.5, ry + perp[1]*eye_radius*0.5);
      ctx.stroke();
      
      ctx.restore();
    }
      
    // -------------------------
    // Render / overlay
    // -------------------------
    function render(show_overlay=null, overlay_big=false) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      draw_board();
      
      // ハニーの描画
      if (honey !== null) {
        const [q, r] = honey;
        const [cx, cy] = axial_to_pixel(q, r);
        const verts = draw_hex_vertices_raw(q, r);
  
        ctx.save();
  
        ctx.shadowBlur = HEX_SIZE * 0.5;
        ctx.shadowColor = "#ff9400";
  
        ctx.beginPath();
        verts.forEach((v, idx) => {
            if (idx === 0) ctx.moveTo(v[0], v[1]);
            else ctx.lineTo(v[0], v[1]);
        });
        ctx.closePath();
        ctx.fillStyle = "#804000"; 
        ctx.fill();
        ctx.strokeStyle = "#ff7700"; 
        ctx.lineWidth = 2;
        ctx.stroke();
  
        ctx.shadowBlur = 0;
  
        const layers = [
            { scale: 0.90, color: "#cc6600" },
            { scale: 0.80, color: "#ff9900" },
            { scale: 0.65, color: "#ffbb00" },
            { scale: 0.45, color: "#ffdd33" },
            { scale: 0.25, color: "#fff599" } 
        ];
  
        layers.forEach(layer => {
            ctx.beginPath();
            verts.forEach((v, idx) => {
            const sx = cx + (v[0] - cx) * layer.scale;
            const sy = cy + (v[1] - cy) * layer.scale;
            if (idx === 0) ctx.moveTo(sx, sy);
            else ctx.lineTo(sx, sy);
            });
            ctx.closePath();
            ctx.fillStyle = layer.color;
            ctx.fill();
        });
  
        ctx.beginPath();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.7)";
        ctx.lineWidth = 2;
        ctx.moveTo(cx + (verts[4][0] - cx) * 0.85, cy + (verts[4][1] - cy) * 0.85);
        ctx.lineTo(cx + (verts[3][0] - cx) * 0.85, cy + (verts[3][1] - cy) * 0.85);
        ctx.lineTo(cx + (verts[2][0] - cx) * 0.85, cy + (verts[2][1] - cy) * 0.85);
        ctx.stroke();
        
        ctx.restore();
      }

      // 【超軽量版】ハニー出現エフェクトの描画と更新
      if (honey_hex_effect) {
        ctx.save();
        ctx.globalAlpha = honey_hex_effect.alpha;
        ctx.strokeStyle = "#ffcc00"; 
        ctx.lineWidth = 3;

        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const angle = (Math.PI / 3) * i;
          const px = honey_hex_effect.cx + Math.cos(angle) * (HEX_SIZE * honey_hex_effect.scale);
          const py = honey_hex_effect.cy + Math.sin(angle) * (HEX_SIZE * honey_hex_effect.scale);
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.restore();

        honey_hex_effect.scale += 1.0; 
        honey_hex_effect.alpha -= 0.20; 

        if (honey_hex_effect.alpha <= 0) {
          honey_hex_effect = null;
        }
      }
      
      draw_snake();

      // UIオーバーレイ
      if (show_overlay) {
        ctx.save();
  
        ctx.fillStyle = "rgba(10, 10, 15, 0.75)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
  
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
  
        const lines = show_overlay.split("\n");
  
        if (lines[0]) {
            ctx.font = overlay_big ? "bold 44px sans-serif" : "bold 38px sans-serif";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ffd86b";
            ctx.fillStyle = "#ffd86b"; 
            ctx.fillText(lines[0], CENTER_X, CENTER_Y - 30);
        }
  
        ctx.shadowBlur = 0;
  
        if (lines[1] && lines.length > 2) {
            ctx.font = "20px sans-serif";
            ctx.fillStyle = "#cccccc";
            ctx.fillText(lines[1], CENTER_X, CENTER_Y + 15);
        }
  
        const actionText = lines[lines.length - 1];
        if (actionText) {
            const btnY = CENTER_X + 75; 
            ctx.font = "bold 16px sans-serif";
    
            const textWidth = ctx.measureText(actionText).width;
            const padX = 24;
            const padY = 12;
    
            ctx.strokeStyle = "rgba(0, 255, 135, 0.6)"; 
            ctx.lineWidth = 2;
            ctx.strokeRect(
                CENTER_X - textWidth / 2 - padX, 
                btnY - padY, 
                textWidth + padX * 2, 
                padY * 2
            );
    
            ctx.fillStyle = "rgba(0, 255, 135, 0.1)";
            ctx.fillRect(
                CENTER_X - textWidth / 2 - padX, 
                btnY - padY, 
                textWidth + padX * 2, 
                padY * 2
            );
    
            ctx.fillStyle = "#00ff87";
            ctx.fillText(actionText, CENTER_X, btnY);
        }
  
        ctx.restore();
      }
    }

    // -------------------------
    // Game logic
    // -------------------------
    function opposite(d1, d2) {
      return d1[0] === -d2[0] && d1[1] === -d2[1];
    }

    function step() {
      if (!running) return;
      const [hq, hr] = snake[0];
      const [dq, dr] = current_dir;
      const new_head = [hq + dq, hr + dr];
      
      if (!in_board(new_head)) {
        game_over = true;
        stop_game(true);
        render(`ゲームオーバー\n最終スコア: ${score}\n画面タップで始めから`, true);
        return;
      }
      if (inSnake(new_head)) {
        game_over = true;
        stop_game(true);
        render(`ゲームオーバー\n最終スコア: ${score}\n画面タップで始めから`, true);
        return;
      }
      
      snake.unshift(new_head);
      
      if (honey !== null && eq(new_head, honey)) {
        score_increment();
        spawn_one_random_honey_not_on_snake();
      } else {
        snake.pop();
      }
      render();
    }

    function score_increment() {
      score += 1;
      score_span.innerText = score.toString();
    }

    // -------------------------
    // Controls / events
    // -------------------------
    function start_game() {
      if (game_over) {
        restart_game();
        return; 
      }
      if (running) return;
      running = true;
      if (interval_id === null) {
        interval_id = setInterval(step, STEP_MS);
      }
      render();
    }

    function stop_game(isGameOver=false) {
      if (!running && !isGameOver) return;
      running = false;
      if (interval_id !== null) {
        clearInterval(interval_id);
        interval_id = null;
      }
      if (!isGameOver) {
        render("一時停止\n画面タップで再開");
      }
    }

    function restart_game() {
      score = 0;
      score_span.innerText = score.toString();
      game_over = false;
      running = false;
      
      place_initial_snake();
      spawn_one_random_honey_not_on_snake();
      
      render("スタート！\n画面タップで開始");
      if (interval_id !== null) {
        clearInterval(interval_id);
        interval_id = null;
      }
    }

    function handle_tap_start(e) {
      if (game_over) {
        restart_game();
        start_game();
      } else if (!running) {
        start_game();
      }
    }

    function compute_dir_mapping() {
      const AXIAL_DELTAS = [[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];
      const desired_angles = {w: -90, e: -30, d: 30, s: 90, a: 150, q: -150};
      
      function angle_of_delta(delta) {
        const [x0, y0] = axial_to_pixel_raw(0, 0);
        const [x1, y1] = axial_to_pixel_raw(delta[0], delta[1]);
        const [rx0, ry0] = rotate_point(x0, y0);
        const [rx1, ry1] = rotate_point(x1, y1);
        const dx = rx1 - rx0;
        const dy = ry1 - ry0;
        return Math.atan2(dy, dx) * 180 / Math.PI;
      }
      
      const delta_angles = AXIAL_DELTAS.map(d => angle_of_delta(d));
      let DIR = {};
      let used = new Set();
      
      for (let key in desired_angles) {
        let want_ang = desired_angles[key];
        let best = null;
        let best_diff = 9999;
        for (let i = 0; i < delta_angles.length; i++) {
          if (used.has(i)) continue;
          let diff = (delta_angles[i] - want_ang + 180) % 360 - 180;
          if (Math.abs(diff) < best_diff) {
            best_diff = Math.abs(diff);
            best = i;
          }
        }
        if (best !== null) {
          used.add(best);
          DIR[key] = AXIAL_DELTAS[best];
        }
      }
      
      const remaining_keys = ["w","q","a","s","d","e"];
      for (let k of remaining_keys) {
        if (!(k in DIR)) {
          for (let i = 0; i < AXIAL_DELTAS.length; i++) {
            if (!used.has(i)) {
              used.add(i);
              DIR[k] = AXIAL_DELTAS[i];
              break;
            }
          }
        }
      }
      return DIR;
    }

    function global_key_handler(evt) {
      const key = evt.key;
      if (key === "Enter") {
        if (game_over) {
          restart_game();
          start_game();
        } else if (!running) {
          start_game();
        }
        return;
      } else if (key === "Escape") {
        if (running) {
          stop_game();
        } else if (!game_over) {
          start_game();
        }
        return;
      }
      
      if (!running) return;
      
      const k = key.toLowerCase();
      if (!(k in DIR_MAPPING)) return;
      
      const new_dir = DIR_MAPPING[k];
      if (opposite(new_dir, current_dir)) return;
      if (eq(new_dir, current_dir)) return;
      
      current_dir = new_dir;
      step(); 
    }

    // -------------------------
    // Initialization
    // -------------------------
    function init() {
      DIR_MAPPING = compute_dir_mapping(); 
      resize_canvas();
      place_initial_snake(); 
      spawn_one_random_honey_not_on_snake(); 
      render("スタート！\n画面タップで開始");
    }

    window.addEventListener("resize", resize_canvas);
    document.addEventListener("keydown", global_key_handler);
    
    canvas.addEventListener("mousedown", handle_tap_start);
    canvas.addEventListener("touchstart", handle_tap_start, { passive: true });
    
    canvas.tabIndex = 0;
    canvas.addEventListener("click", () => canvas.focus());

    init();

  </script>
  <script src="swipe.js"></script>
</body>
</html>
